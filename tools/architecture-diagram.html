<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>UFIS Architecture Diagram</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #fff;
    font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px;
  }
  .controls {
    margin-bottom: 16px;
    display: flex;
    gap: 12px;
    align-items: center;
  }
  .controls button {
    padding: 8px 20px;
    font-size: 14px;
    cursor: pointer;
    border: 1px solid #555;
    border-radius: 4px;
    background: #f5f5f5;
  }
  .controls button:hover { background: #e0e0e0; }
  .controls select {
    padding: 8px 12px;
    font-size: 14px;
    border: 1px solid #555;
    border-radius: 4px;
  }
  svg { border: 1px solid #ccc; }
</style>
</head>
<body>

<div class="controls">
  <label>Scale:

      <option value="3">3x (2880 x 2160)</option>

  </label>
  <button onclick="exportPNG()">Export PNG</button>

  <!-- Background -->

  <!-- Title -->

  <!-- External client box -->

  <text x="620" y="116" text-anchor="middle" font-size="10.5" fill="#666"

  <!-- Arrows: Client -> API -->

  <line x1="620" y1="124" x2="620" y2="168" stroke="#444" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="632" y="152" font-size="10" fill="#666"
        font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif">HTTP</text>

  <!-- ============ APPLICATION TIER ============ -->

  <!-- Arrows down to Repository -->

  <rect x="40" y="554" width="250" height="80" rx="6" fill="#f5f0fa" stroke="#9a80b8" stroke-width="1.5"/>
  <text x="165" y="576" text-anchor="middle" font-size="13" font-weight="bold" fill="#5a3a7a"

  <text x="165" y="594" text-anchor="middle" font-size="10" fill="#7a5a9a"

  <text x="165" y="610" text-anchor="middle" font-size="10" fill="#7a5a9a"

  <text x="165" y="626" text-anchor="middle" font-size="10" fill="#7a5a9a"

        font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif"

  <!-- ============ BENCHMARK (side component) ============ -->
  <rect x="310" y="554" width="250" height="80" rx="6" fill="#f5f0fa" stroke="#9a80b8" stroke-width="1.5"/>
  <text x="435" y="576" text-anchor="middle" font-size="13" font-weight="bold" fill="#5a3a7a"

  <line x1="830" y1="570" x2="830" y2="614" stroke="#7070a8" stroke-width="1.2"/>
  <ellipse cx="750" cy="614" rx="80" ry="14" fill="#d8d8f0" stroke="#7070a8" stroke-width="1.2"/>

<script>
function exportPNG() {
  const svg = document.getElementById('diagram');
  const scale = parseInt(document.getElementById('scale').value);
  const w = 960 * scale;
  const h = 720 * scale;

  const canvas = document.createElement('canvas');
  canvas.width = w;
  canvas.height = h;
  const ctx = canvas.getContext('2d');
  ctx.scale(scale, scale);

  const data = new XMLSerializer().serializeToString(svg);
  const blob = new Blob([data], { type: 'image/svg+xml;charset=utf-8' });
  const url = URL.createObjectURL(blob);

  const img = new Image();
  img.onload = function () {
    ctx.fillStyle = '#fff';
    ctx.fillRect(0, 0, 960, 720);
    ctx.drawImage(img, 0, 0, 960, 720);
    URL.revokeObjectURL(url);

    const a = document.createElement('a');
    a.download = 'ufis-architecture-' + scale + 'x.png';
    a.href = canvas.toDataURL('image/png');
    a.click();
  };
  img.src = url;
}

function exportSVG() {
  const svg = document.getElementById('diagram');
  const data = new XMLSerializer().serializeToString(svg);
  const blob = new Blob([data], { type: 'image/svg+xml;charset=utf-8' });
  const a = document.createElement('a');
  a.download = 'ufis-architecture.svg';
  a.href = URL.createObjectURL(blob);
  a.click();
}
</script>
</body>
