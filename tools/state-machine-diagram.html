<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>UFIS State Machine Diagrams</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #fff;
    font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px;
    gap: 32px;
  }
  .controls {
    margin-bottom: 8px;
    display: flex;
    gap: 12px;
    align-items: center;
  }
  .controls button {
    padding: 8px 20px;
    font-size: 14px;
    cursor: pointer;
    border: 1px solid #555;
    border-radius: 4px;
    background: #f5f5f5;
  }
  .controls button:hover { background: #e0e0e0; }
  .controls select {
    padding: 8px 12px;
    font-size: 14px;
    border: 1px solid #555;
    border-radius: 4px;
  }
  svg { border: 1px solid #ccc; }
  h2 { font-size: 16px; color: #333; margin-top: 12px; }
</style>
</head>
<body>

<div class="controls">
  <label>Scale:
    <select id="scale">
      <option value="1">1x</option>
      <option value="2" selected>2x</option>
      <option value="3">3x</option>
    </select>
  </label>
  <button onclick="exportPNG('security-sm', 820, 520, 'ufis-security-state-machine')">Export Security PNG</button>
  <button onclick="exportSVG('security-sm', 'ufis-security-state-machine')">Export Security SVG</button>
  <button onclick="exportPNG('entity-sm', 820, 420, 'ufis-entity-state-machine')">Export Entity PNG</button>
  <button onclick="exportSVG('entity-sm', 'ufis-entity-state-machine')">Export Entity SVG</button>
</div>

<!-- ================================================================== -->
<!--              FIGURE 3: SECURITY STATE MACHINE                      -->
<!-- ================================================================== -->
<h2>Figure 3 Security Lifecycle State Machine</h2>

<svg id="security-sm" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 520" width="820" height="520">
  <defs>
    <marker id="s-arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#444"/>
    </marker>
    <marker id="s-arrow-green" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3a7a4a"/>
    </marker>
  </defs>

  <rect width="820" height="520" fill="#fff"/>

  <!-- Title -->
  <text x="410" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#222"
        font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif">Security Lifecycle State Machine</text>

  <!-- ── Initial state (filled circle) ── -->
  <circle cx="80" cy="200" r="10" fill="#333"/>
  <!-- Arrow: initial -> ACTIVE -->
  <line x1="90" y1="200" x2="158" y2="200" stroke="#333" stroke-width="2" marker-end="url(#s-arrow)"/>

  <!-- ══════════════════════════════════════════ -->
  <!--                 ACTIVE state               -->
  <!-- ══════════════════════════════════════════ -->
  <rect x="160" y="160" width="180" height="80" rx="10" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2.2"/>
  <text x="250" y="196" text-anchor="middle" font-size="17" font-weight="bold" fill="#2e7d32"
        font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif">ACTIVE</text>
  <text x="250" y="218" text-anchor="middle" font-size="10.5" fill="#555"
        font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif">Accepts all corporate actions</text>

  <!-- ── Self-loop: NAME_CHANGE (stays ACTIVE) ── -->
  <path d="M 210 160 C 200 90, 300 90, 290 160" fill="none" stroke="#3a7a4a" stroke-width="1.8"
        marker-end="url(#s-arrow-green)"/>
  <rect x="206" y="96" width="88" height="17" rx="2" fill="#fff" fill-opacity="0.92"/>
  <text x="250" y="109" text-anchor="middle" font-size="11" fill="#3a7a4a" font-weight="600"
        font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif">NAME_CHANGE</text>
  <text x="250" y="82" text-anchor="middle" font-size="9.5" fill="#666" font-style="italic"
        font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif">stays ACTIVE</text>

  <!-- ── Self-loop: SPIN_OFF parent (stays ACTIVE) ── -->
  <path d="M 160 175 C 80 155, 80 245, 160 225" fill="none" stroke="#3a7a4a" stroke-width="1.8"
        marker-end="url(#s-arrow-green)"/>
  <rect x="58" y="182" width="72" height="32" rx="2" fill="#fff" fill-opacity="0.92"/>
  <text x="94" y="196" text-anchor="middle" font-size="11" fill="#3a7a4a" font-weight="600"
        font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif">SPIN_OFF</text>
  <text x="94" y="210" text-anchor="middle" font-size="9.5" fill="#666" font-style="italic"
        font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif">parent survives</text>

  <!-- ══════════════════════════════════════════ -->
  <!--              MERGED state (terminal)       -->
  <!-- ══════════════════════════════════════════ -->
  <rect x="540" y="60" width="200" height="80" rx="10" fill="#fce4ec" stroke="#c62828" stroke-width="2.2"/>
  <!-- Double border for terminal state -->
  <rect x="546" y="66" width="188" height="68" rx="8" fill="none" stroke="#c62828" stroke-width="1" stroke-dasharray="none"/>
  <text x="640" y="98" text-anchor="middle" font-size="17" font-weight="bold" fill="#c62828"
        font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif">MERGED</text>
  <text x="640" y="118" text-anchor="middle" font-size="10.5" fill="#888"
        font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif">Terminal no further actions</text>

  <!-- Arrow: ACTIVE -> MERGED -->
  <path d="M 340 185 L 440 130 L 540 100" fill="none" stroke="#c62828" stroke-width="2"
        marker-end="url(#s-arrow)"/>
  <rect x="388" y="126" width="68" height="17" rx="2" fill="#fff" fill-opacity="0.92"/>
  <text x="422" y="139" text-anchor="middle" font-size="11.5" fill="#c62828" font-weight="600"
        font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif">MERGER</text>

  <!-- ══════════════════════════════════════════ -->
  <!--              SPLIT state (terminal)        -->
  <!-- ══════════════════════════════════════════ -->
  <rect x="540" y="190" width="200" height="80" rx="10" fill="#fce4ec" stroke="#c62828" stroke-width="2.2"/>
  <rect x="546" y="196" width="188" height="68" rx="8" fill="none" stroke="#c62828" stroke-width="1"/>
  <text x="640" y="228" text-anchor="middle" font-size="17" font-weight="bold" fill="#c62828"
        font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif">SPLIT</text>
  <text x="640" y="248" text-anchor="middle" font-size="10.5" fill="#888"
        font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif">Terminal no further actions</text>

  <!-- Arrow: ACTIVE -> SPLIT -->
  <line x1="340" y1="210" x2="540" y2="228" stroke="#c62828" stroke-width="2"
        marker-end="url(#s-arrow)"/>
  <rect x="388" y="200" width="92" height="17" rx="2" fill="#fff" fill-opacity="0.92"/>
  <text x="434" y="213" text-anchor="middle" font-size="11.5" fill="#c62828" font-weight="600"
        font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif">STOCK_SPLIT</text>

  <!-- ══════════════════════════════════════════ -->
  <!--              REDEEMED state (terminal)     -->
  <!-- ══════════════════════════════════════════ -->
  <rect x="540" y="320" width="200" height="80" rx="10" fill="#fce4ec" stroke="#c62828" stroke-width="2.2"/>
  <rect x="546" y="326" width="188" height="68" rx="8" fill="none" stroke="#c62828" stroke-width="1"/>
  <text x="640" y="358" text-anchor="middle" font-size="17" font-weight="bold" fill="#c62828"
        font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif">REDEEMED</text>
  <text x="640" y="378" text-anchor="middle" font-size="10.5" fill="#888"
        font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif">Terminal no further actions</text>

  <!-- Arrow: ACTIVE -> REDEEMED -->
  <path d="M 340 215 L 440 305 L 540 360" fill="none" stroke="#c62828" stroke-width="2"
        marker-end="url(#s-arrow)"/>
  <rect x="376" y="278" width="90" height="17" rx="2" fill="#fff" fill-opacity="0.92"/>
  <text x="421" y="291" text-anchor="middle" font-size="11.5" fill="#c62828" font-weight="600"
        font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif">REDEMPTION</text>

  <!-- ══════════════════════════════════════════ -->
  <!--                    LEGEND                  -->
  <!-- ══════════════════════════════════════════ -->
  <rect x="40" y="430" width="740" height="70" rx="5" fill="#fafafa" stroke="#ccc" stroke-width="1"/>
  <text x="60" y="452" font-size="11.5" font-weight="bold" fill="#444"
        font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif">Legend</text>

  <!-- Initial state -->
  <circle cx="70" cy="475" r="6" fill="#333"/>
  <text x="86" y="479" font-size="10.5" fill="#555"
        font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif">Initial state</text>

  <!-- Active state -->
  <rect x="210" y="464" width="50" height="22" rx="6" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="274" y="479" font-size="10.5" fill="#555"
        font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif">Active state (accepts actions)</text>

  <!-- Terminal state -->
  <rect x="470" y="464" width="50" height="22" rx="6" fill="#fce4ec" stroke="#c62828" stroke-width="1.5"/>
  <rect x="473" y="467" width="44" height="16" rx="5" fill="none" stroke="#c62828" stroke-width="0.8"/>
  <text x="534" y="479" font-size="10.5" fill="#555"
        font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif">Terminal state (rejects all actions)</text>
</svg>

<script>
function exportPNG(svgId, w, h, filename) {
  const svg = document.getElementById(svgId);
  const scale = parseInt(document.getElementById('scale').value);
  const cw = w * scale;
  const ch = h * scale;

  const canvas = document.createElement('canvas');
  canvas.width = cw;
  canvas.height = ch;
  const ctx = canvas.getContext('2d');
  ctx.scale(scale, scale);

  const data = new XMLSerializer().serializeToString(svg);
  const blob = new Blob([data], { type: 'image/svg+xml;charset=utf-8' });
  const url = URL.createObjectURL(blob);

  const img = new Image();
  img.onload = function () {
    ctx.fillStyle = '#fff';
    ctx.fillRect(0, 0, w, h);
    ctx.drawImage(img, 0, 0, w, h);
    URL.revokeObjectURL(url);

    const a = document.createElement('a');
    a.download = filename + '-' + scale + 'x.png';
    a.href = canvas.toDataURL('image/png');
    a.click();
  };
  img.src = url;
}

function exportSVG(svgId, filename) {
  const svg = document.getElementById(svgId);
  const data = new XMLSerializer().serializeToString(svg);
  const blob = new Blob([data], { type: 'image/svg+xml;charset=utf-8' });
  const a = document.createElement('a');
  a.download = filename + '.svg';
  a.href = URL.createObjectURL(blob);
  a.click();
}
</script>
</body>
</html>
