<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>UFIS Entity-Relationship Diagram</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #fff;
    font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px;
  }
  .controls {
    margin-bottom: 16px;
    display: flex;
    gap: 12px;
    align-items: center;
  }
  .controls button {
    padding: 8px 20px;
    font-size: 14px;
    cursor: pointer;
    border: 1px solid #555;
    border-radius: 4px;
    background: #f5f5f5;
  }
  .controls button:hover { background: #e0e0e0; }
  .controls select {
    padding: 8px 12px;
    font-size: 14px;
    border: 1px solid #555;
    border-radius: 4px;
  }
  svg { border: 1px solid #ccc; }
</style>
</head>
<body>

<div class="controls">
  <label>Scale:
    <select id="scale">
      <option value="1">1x (1060 x 780)</option>
      <option value="2" selected>2x (2120 x 1560)</option>
      <option value="3">3x (3180 x 2340)</option>
    </select>
  </label>
  <button onclick="exportPNG()">Export PNG</button>
  <button onclick="exportSVG()">Export SVG</button>
</div>

    <marker id="dot" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto">

        font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif">
    UFIS Entity-Relationship Diagram

  <!-- ================================================================== -->

  <rect x="40" y="96" width="280" height="10" fill="#4a7a5a"/>

        font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif">Legal Entity</text>
  <!-- Attributes -->
  <text x="56" y="128" font-size="11.5" fill="#333" font-family="'Consolas','Courier New',monospace">
    <tspan font-weight="bold" fill="#b8860b">PK</tspan>  id : UUID
  </text>
  <line x1="50" y1="134" x2="310" y2="134" stroke="#ddd" stroke-width="0.7"/>

  <text x="72" y="202" font-size="11.5" fill="#333" font-family="'Consolas','Courier New',monospace">state : ref <tspan font-size="9.5" fill="#888">{ACTIVE, MERGED,</tspan></text>
  <text x="72" y="216" font-size="9.5" fill="#888" font-family="'Consolas','Courier New',monospace">            ACQUIRED}</text>
  <text x="72" y="234" font-size="11.5" fill="#333" font-family="'Consolas','Courier New',monospace">active : boolean</text>
  <text x="72" y="252" font-size="11.5" fill="#333" font-family="'Consolas','Courier New',monospace">founded-date : instant</text>

<script>
function exportPNG() {
  const svg = document.getElementById('diagram');
  const scale = parseInt(document.getElementById('scale').value);
  const w = 1060 * scale;
  const h = 780 * scale;

  const canvas = document.createElement('canvas');
  canvas.width = w;
  canvas.height = h;
  const ctx = canvas.getContext('2d');
  ctx.scale(scale, scale);

  const data = new XMLSerializer().serializeToString(svg);
  const blob = new Blob([data], { type: 'image/svg+xml;charset=utf-8' });
  const url = URL.createObjectURL(blob);

  const img = new Image();
  img.onload = function () {
    ctx.fillStyle = '#fff';
    ctx.fillRect(0, 0, 1060, 780);
    ctx.drawImage(img, 0, 0, 1060, 780);
    URL.revokeObjectURL(url);

    const a = document.createElement('a');
    a.download = 'ufis-er-diagram-' + scale + 'x.png';
    a.href = canvas.toDataURL('image/png');
    a.click();
  };
  img.src = url;
}

function exportSVG() {
  const svg = document.getElementById('diagram');
  const data = new XMLSerializer().serializeToString(svg);
  const blob = new Blob([data], { type: 'image/svg+xml;charset=utf-8' });
  const a = document.createElement('a');
  a.download = 'ufis-er-diagram.svg';
  a.href = URL.createObjectURL(blob);
  a.click();
}
</script>
